# vim: ft=tmux
# Configure and load catppuccin prior to plugin load if it exists

# Set global catppuccin settings:
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Detect where the plugin directory is:
%hidden _TMUXEDO_PLUGINS_DIR="unset"

%hidden _new_tmuxedo_plugins="${HOME}/.local/share/tmuxedo/plugins"
%hidden _old_tmuxedo_plugins="${XDG_CONFIG_HOME}/tmux/plugins"

if-shell "test -d $_new_tmuxedo_plugins" {
  %hidden _TMUXEDO_PLUGINS="${_new_tmuxedo_plugins}"
} {
  %if "#{==,#{_TMUXEDO_PLUGINS_DIR},unset}"
  if-shell "test -d $_old_tmuxedo_plugins" {
    %hidden _TMUXEDO_PLUGINS="${_old_tmuxedo_plugins}"
  }
  %else
    display-message "$$_TMUXEDO_PLUGINS_DIR not found! Re-run tmuxedo!"
  %endif
}

# Need a hidden reference to the tmux config path for variable expansion here.
%hidden _CATPPUCCIN_SCRIPT="${_TMUXEDO_PLUGINS}/catppuccin_tmux/catppuccin.tmux"

%if "#{==,#{_TMUXEDO_PLUGINS_DIR},unset}"
# If tmuxedo has loaded the plugin 
if-shell "test -e $_CATPPUCCIN_SCRIPT" {
  # modified from:
  # https://github.com/catppuccin/tmux?tab=readme-ov-file#recommended-default-configuration
  run-shell "$_CATPPUCCIN_SCRIPT"
  set -g status-right-length 100
  set -g status-left-length 100
  set -g status-left ""
  set -g status-right "#{E:@catppuccin_status_application}"
  # set -agF status-right "#{E:@catppuccin_status_cpu}"
  set -ag status-right "#{E:@catppuccin_status_session}"
  set -ag status-right "#{E:@catppuccin_status_uptime}"
  #  set -agF status-right "#{E:@catppuccin_status_battery}"
} {
  display-message "$_CATPPUCCIN_SCRIPT not found! Re-run tmuxedo!"
}
%endif
